
services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: super-ai-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: super-ai-backend
    restart: always
    ports:
      - "8123:8123"
    depends_on:
      redis:
        condition: service_healthy
    command: ["--spring.profiles.active=prod"]
    volumes:
      - ./logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: super-ai-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  redis_data:
