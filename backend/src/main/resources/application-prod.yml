spring:
  application:
    name: super-ai-agents
  ai:
    vectorstore:
      redis:
        index-name: spring_ai_index
        initialize-schema: true
        prefix: "doc:"
    mcp:
      client:
        enabled: true
        name: super-ai-agents-client
        version: 1.0.0
        request-timeout: 60s
        type: SYNC
        toolcallback:
          enabled: true
        stdio:
          servers-configuration: classpath:mcp-servers.json
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: 0
server:
  port: 8123
  servlet:
    context-path: /api
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.example.superaiagents.controller
knife4j:
  enable: true
  setting:
    language: zh-CN