spring:
  application:
    name: super-ai-agents
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-b54295f09c8147308af17f975627f459}
      chat:
        options:
          model: qwen-plus
      embedding:
        api-key: ${DASHSCOPE_EMBEDDING_API_KEY:sk-b54295f09c8147308af17f975627f459}
        options:
          model: text-embedding-v3
    vectorstore:
      redis:
        index-name: spring_ai_index
        initialize-schema: true
        prefix: "doc:"
    mcp:
      client:
        enabled: false  # 生产环境暂时禁用 MCP
        toolcallback:
          enabled: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: 0
server:
  port: 8123
  servlet:
    context-path: /api
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.example.superaiagents.controller
knife4j:
  enable: true
  setting:
    language: zh-CN
search-api:
  api-key: ${SEARCH_API_KEY:JKnHdC84NBZjqJpb9T3sj7kt}