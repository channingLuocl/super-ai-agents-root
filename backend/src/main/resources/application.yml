spring:
  application:
    name: super-ai-agents
  profiles:
    active: dev
  autoconfigure:
    exclude:
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeChatAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAgentAutoConfiguration
  ai:
    model:
      chat: openai
    openai:
      base-url: https://api.minimaxi.com
      embedding:
        enabled: false
      chat:
        completions-path: /v1/chat/completions
        options:
          model: MiniMax-M2.7
    dashscope:
      embedding:
        options:
          model: text-embedding-v3
    vectorstore:
      redis:
        index-name: spring_ai_index
        initialize-schema: true
        prefix: "doc:"
    mcp:
      client:
        enabled: true
        name: super-ai-agents-client
        version: 1.0.0
        request-timeout: 60s
        type: SYNC
        toolcallback:
          enabled: true
  data:
    redis:
      host: 127.0.0.1
      port: 6380
      database: 0

server:
  port: 8123
  servlet:
    context-path: /api

rag:
  similarity-threshold: 0.5
  top-k: 8
  index:
    sync-on-startup: true
    reset-on-missing-manifest: true
    batch-size: 10

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: "/**"
      packages-to-scan: com.example.superaiagents.controller

knife4j:
  enable: true
  setting:
    language: zh-CN
